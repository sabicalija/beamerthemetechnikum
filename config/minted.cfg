% Minted Configuration for Technikum Theme
% Code highlighting defaults, line number styling, and listing environment

% =============================================================================
% COLORS
% =============================================================================

% Background and frame colors for code listings
% Previous: warm yellow scheme
%   \definecolor{listing-bg}{RGB}{255,252,240}
%   \definecolor{listing-frame}{RGB}{220,215,190}
\definecolor{listing-bg}{RGB}{250,250,250}
\definecolor{listing-frame}{RGB}{180,180,180}

% =============================================================================
% MINTED GLOBAL SETTINGS
% =============================================================================

\setminted{
    style=fhtw,
    bgcolor=listing-bg!5,
    fillcolor=\color{listing-bg},
    frame=single,
    framesep=1mm,
    framerule=0.5pt,
    rulecolor=\color{listing-frame},
    linenos,
    breaklines,
    numbersep=0.5em,
    xleftmargin=2em,
    highlightcolor=fhtw-blue!10,
}

% Disable background color for inline code (\mintinline)
\setmintedinline{bgcolor={}}

% =============================================================================
% LINE NUMBER STYLING
% =============================================================================

% Style line numbers: monospaced, gray, old-style numerals (inherits code font size)
\renewcommand{\theFancyVerbLine}{%
    \ttfamily\textcolor{fhtw-gray}{\oldstylenums{\arabic{FancyVerbLine}}}%
}

% =============================================================================
% LISTING ENVIRONMENT (BEAMER COMPATIBILITY)
% =============================================================================

% Redefine listing as non-floating environment
% (matches how beamer handles figure/table)
\providecommand{\listingname}{Listing}

\renewenvironment{listing}[1][]{%
  \def\@captype{listing}%
}{%
  \par\nobreak
}

\endinput
