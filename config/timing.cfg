% Timing Diagram Configuration for Technikum Theme
% Conditionally applied when the user loads tikz-timing

\AtBeginDocument{%
    \@ifpackageloaded{tikz-timing}{%
        % Signal colours — theme palette
        \colorlet{timing-logic}{fhtw-blue}
        \colorlet{timing-clock}{fhtw-green!80!black}
        \colorlet{timing-hiz}{fhtw-gray}
        \colorlet{timing-data}{fhtw-green!70!black}
        \colorlet{timing-unknown}{red!70!black}

        % Override default character styles
        \tikzset{
            timing/slope=0.1,
            timing/text/.style={font=\sffamily\scriptsize},
            timing/name/.style={font=\sffamily\small, text=fhtw-blue},
            timing/h/.style={draw=timing-logic},
            timing/l/.style={draw=timing-logic},
            timing/c/.style={timing/lslope=0.0, draw=timing-clock},
            timing/z/.style={draw=timing-hiz, dashed},
            timing/d/.style={draw=timing-data},
            timing/d/text/.style={timing, scale=0.6, font=\sffamily, text=black, text depth=0pt},
            timing/d/background/.style={draw=none, fill=timing-data!10},
            timing/x/.style={draw=timing-unknown},
        }
    }{}%
}

\endinput
