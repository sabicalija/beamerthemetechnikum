% Algorithm2e Configuration for Technikum Theme
% Conditionally applied when the user loads algorithm2e

\AtBeginDocument{%
\@ifpackageloaded{algorithm2e}{%
% Suppress default spacing
\SetAlgoSkip{}

% Algorithm left margin matching minted's xleftmargin
\setlength{\algomargin}{2em}

% Line number styling matching minted: monospaced, gray, old-style numerals
\newcommand{\alglinenumberstyle}[1]{%
    \texttt{\textcolor{fhtw-gray}{\oldstylenums{#1}}}%
}
\SetNlSty{alglinenumberstyle}{}{}
\SetNlSkip{0.5em}

% Comment styling
\SetKwComment{Comment}{\color{fhtw-gray}\textit{// }}{}
\SetKw{KwTo}{\color{fhtw-blue}to}
\SetKw{KwAnd}{\color{fhtw-blue}and}
\SetKw{KwOr}{\color{fhtw-blue}or}
\SetKw{KwNot}{\color{fhtw-blue}not}
\SetKw{Return}{\color{fhtw-blue}return}

% Keyword colouring
\newcommand{\algokwstyle}[1]{\textcolor{fhtw-blue}{\textbf{#1}}}
\SetKwSty{algokwstyle}
\SetKwInput{KwIn}{\textcolor{fhtw-green!80!black}{\textbf{Input}}}
\SetKwInput{KwOut}{\textcolor{fhtw-green!80!black}{\textbf{Output}}}

% Algorithm display environment — visual box matching minted listing style
% Uses listing-bg/listing-frame from minted.cfg
\newsavebox{\algorithmcontentbox}
\newenvironment{algorithmdisplay}{%
\begin{lrbox}{\algorithmcontentbox}%
    \begin{minipage}{\dimexpr\textwidth-2mm-1pt\relax}%
        }{%
    \end{minipage}%
\end{lrbox}%
{\setlength{\fboxsep}{1mm}\setlength{\fboxrule}{0.5pt}%
\noindent\fcolorbox{listing-frame}{listing-bg!5}{\usebox{\algorithmcontentbox}}}%
}

% Algorithm caption — bold fhtw-blue label, black text, centered below the box
\newcounter{algorithmdisplay}
\newcommand{\algocaption}[1]{%
\refstepcounter{algorithmdisplay}%
\par\vskip0.25em
{\centering{\small\bfseries\color{fhtw-blue}Algorithm~\thealgorithmdisplay:}~{\small #1}\par}%
}
}{}%
}

\endinput
